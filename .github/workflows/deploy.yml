name: Deploy Static Site

on:
  workflow_run:
    workflows: ["Static Site Quality Check"]
    types:
      - completed

env:
  REGISTRY: ghcr.io

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy: ${{ steps.set-env.outputs.deploy }}
    steps:
      - name: Determine target environment
        id: set-env
        run: |
          echo "════════════════════════════════════════════"
          echo "🔍 ENVIRONMENT DETECTION STARTED"
          echo "📌 Current Branch: ${{ github.ref }}"
          echo "════════════════════════════════════════════"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "✅ ENVIRONMENT SET TO: production"
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=testing" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "✅ ENVIRONMENT SET TO: testing"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "✅ ENVIRONMENT SET TO: development"
          else
            echo "environment=none" >> $GITHUB_OUTPUT
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️  DEPLOY SKIPPED - Branch not configured"
          fi
          echo "════════════════════════════════════════════"

      - name: Skip notification
        if: steps.set-env.outputs.deploy == 'false'
        run: echo "⏭️  Skipping deployment for branch ${{ github.ref }}"

  deploy:
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Environment Variables
        run: |
          echo "════════════════════════════════════════════"
          echo "📊 WORKFLOW EXECUTION ENVIRONMENT"
          echo "════════════════════════════════════════════"
          echo "🎯 Target Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🔄 Deploy Flag: ${{ needs.determine-environment.outputs.deploy }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "👤 Actor: ${{ github.actor }}"
          echo "🏢 Repository: ${{ github.repository }}"
          echo "════════════════════════════════════════════"

      - name: Prepare Deployment Artifact
        run: |
          rsync -av --exclude=".git" --exclude=".github" ./ ./

      - name: Debug SSH Key Format
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "🔍 SSH KEY FORMAT CHECK"
          echo "════════════════════════════════════════════"

          KEY_LENGTH=$(echo -n "${{ secrets.HOST_KEY }}" | wc -c)
          echo "📊 SSH Key length: $KEY_LENGTH characters"

          if echo "${{ secrets.HOST_KEY }}" | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "✅ SSH Key has valid BEGIN marker"
          else
            echo "❌ WARNING: SSH Key might not be in correct format"
          fi

          if echo "${{ secrets.HOST_KEY }}" | grep -q "END.*PRIVATE KEY"; then
            echo "✅ SSH Key has valid END marker"
          else
            echo "❌ WARNING: SSH Key might be incomplete"
          fi

          echo "════════════════════════════════════════════"
          echo ""

      - name: Validate Required Secrets
        id: validate-secrets
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "🔐 VALIDATING DEPLOYMENT SECRETS"
          echo "════════════════════════════════════════════"

          HOST_IP="${{ secrets.HOST_IP }}"
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
          DEPLOY_USERNAME="${{ secrets.DEPLOY_USERNAME }}"
          HOST_KEY="${{ secrets.HOST_KEY }}"

          MISSING_SECRETS=""

          if [ -z "$HOST_IP" ] || [ "$HOST_IP" = "null" ] || [ "$HOST_IP" = "" ]; then
            echo "❌ HOST_IP not configured"
            MISSING_SECRETS="${MISSING_SECRETS}HOST_IP "
          else
            echo "✅ HOST_IP is set"
          fi

          if [ -z "$DEPLOY_PATH" ] || [ "$DEPLOY_PATH" = "null" ] || [ "$DEPLOY_PATH" = "" ]; then
            echo "❌ DEPLOY_PATH not configured"
            MISSING_SECRETS="${MISSING_SECRETS}DEPLOY_PATH "
          else
            echo "✅ DEPLOY_PATH is set"
          fi

          if [ -z "$DEPLOY_USERNAME" ] || [ "$DEPLOY_USERNAME" = "null" ] || [ "$DEPLOY_USERNAME" = "" ]; then
            echo "❌ DEPLOY_USERNAME not configured"
            MISSING_SECRETS="${MISSING_SECRETS}DEPLOY_USERNAME "
          else
            echo "✅ DEPLOY_USERNAME is set"
          fi

          if [ -z "$HOST_KEY" ] || [ "$HOST_KEY" = "null" ] || [ "$HOST_KEY" = "" ]; then
            echo "❌ HOST_KEY not configured"
            MISSING_SECRETS="${MISSING_SECRETS}HOST_KEY "
          else
            echo "✅ HOST_KEY is set"
          fi

          echo "════════════════════════════════════════════"
          echo ""

          if [ -n "$MISSING_SECRETS" ]; then
            echo "⚠️  ⚠️  ⚠️  MISSING SECRETS ⚠️  ⚠️  ⚠️ "
            echo "Missing: $MISSING_SECRETS"
            echo ""
            echo "📋 STEP-BY-STEP FIX:"
            echo ""
            echo "1️⃣  Go to GitHub.com → Your Repository"
            echo "2️⃣  Click 'Settings' (gear icon at top)"
            echo "3️⃣  In left menu, click 'Environments'"
            echo "4️⃣  Click on the environment: '${{ needs.determine-environment.outputs.environment }}'"
            echo "5️⃣  Click 'Add secret' button"
            echo "6️⃣  Add these secrets (create each one):"
            echo ""
            echo "   Name: HOST_IP"
            echo "   Value: (your server's IP address, e.g., 192.168.1.100)"
            echo ""
            echo "   Name: DEPLOY_PATH"
            echo "   Value: (path where files go, e.g., /var/www/html)"
            echo ""
            echo "   Name: DEPLOY_USERNAME"
            echo "   Value: (SSH username, e.g., ubuntu or deploy)"
            echo ""
            echo "   Name: HOST_KEY"
            echo "   Value: (your SSH private key)"
            echo ""
            echo "════════════════════════════════════════════"
            echo "❌ DEPLOYMENT STOPPED - SECRETS MISSING"
            echo "════════════════════════════════════════════"
            exit 1
          else
            echo "✅ ALL REQUIRED SECRETS CONFIGURED"
            echo "🚀 PROCEEDING WITH DEPLOYMENT"
            echo "════════════════════════════════════════════"
            echo ""
          fi

      - name: Test SSH Connection
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          port: 22
          passphrase: ""
          timeout: 30s
          command_timeout: 10m
          script_stop: true
          sync: false
          script: |
            echo ""
            echo "🔗 SSH CONNECTION SUCCESSFUL ✅"
            echo "=========================="
            echo "Hostname: $(hostname)"
            echo "User: $(whoami)"
            echo "Current Time: $(date)"
            echo "Disk Space:"
            df -h | grep -E "Filesystem|^/"
            echo "=========================="
            echo ""

      - name: Display Deployment Info
        run: |
          set -e
          echo ""
          echo "════════════════════════════════════════════"
          echo "🚀 DEPLOYMENT CONFIGURATION SUMMARY"
          echo "════════════════════════════════════════════"
          echo "🎯 Target Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "👤 Actor: ${{ github.actor }}"
          echo ""
          echo "📋 DEPLOYMENT STEPS:"
          echo "   1️⃣  Clean remote folder at ${{ secrets.DEPLOY_PATH }}"
          echo "   2️⃣  Copy files via SCP"
          echo "   3️⃣  Restart Nginx"
          echo "════════════════════════════════════════════"
          echo ""

      - name: Clean remote folder
        continue-on-error: false
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          port: 22
          passphrase: ""
          timeout: 30s
          command_timeout: 10m
          script_stop: true
          script: |
            echo "🗑️  Cleaning: ${{ secrets.DEPLOY_PATH }}"
            rm -rf ${{ secrets.DEPLOY_PATH }}/*
            echo "✅ Cleaned successfully"

      - name: Deploy to ${{ needs.determine-environment.outputs.environment }}
        continue-on-error: false
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          port: 22
          source: "./*"
          target: "${{ secrets.DEPLOY_PATH }}"
          strip_prefix: false
          overwrite: true

      - name: Restart Nginx
        continue-on-error: false
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          port: 22
          passphrase: ""
          timeout: 30s
          command_timeout: 10m
          script_stop: true
          script: |
            echo "🔄 Restarting Nginx..."
            sudo systemctl restart nginx
            echo "✅ Nginx restarted successfully"
            echo "🌐 Service Status:"
            sudo systemctl status nginx --no-pager || true

      - name: Deployment Success
        if: success()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "════════════════════════════════════════════"
          echo "🎯 Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "⏰ Timestamp: $(date)"
          echo "════════════════════════════════════════════"
          echo ""

      - name: Deployment Failed
        if: failure()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "❌ DEPLOYMENT FAILED"
          echo "════════════════════════════════════════════"
          echo "🎯 Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "⏰ Timestamp: $(date)"
          echo "════════════════════════════════════════════"
          exit 1
