name: Deploy Static Site

on:
  workflow_run:
    workflows: ["Static Site Quality Check"]
    types:
      - completed

env:
  REGISTRY: ghcr.io

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy: ${{ steps.set-env.outputs.deploy }}
    steps:
      - name: Determine target environment
        id: set-env
        run: |
          echo "════════════════════════════════════════════"
          echo "🔍 ENVIRONMENT DETECTION STARTED"
          echo "📌 Current Branch: ${{ github.ref }}"
          echo "════════════════════════════════════════════"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "✅ ENVIRONMENT SET TO: production"
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=testing" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "✅ ENVIRONMENT SET TO: testing"
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "✅ ENVIRONMENT SET TO: development"
          else
            echo "environment=none" >> $GITHUB_OUTPUT
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️  DEPLOY SKIPPED - Branch not configured"
          fi
          echo "════════════════════════════════════════════"

      - name: Skip notification
        if: steps.set-env.outputs.deploy == 'false'
        run: echo "⏭️  Skipping deployment for branch ${{ github.ref }}"

  deploy:
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Environment Variables
        run: |
          echo "════════════════════════════════════════════"
          echo "📊 WORKFLOW EXECUTION ENVIRONMENT"
          echo "════════════════════════════════════════════"
          echo "🎯 Target Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🔄 Deploy Flag: ${{ needs.determine-environment.outputs.deploy }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "👤 Actor: ${{ github.actor }}"
          echo "🏢 Repository: ${{ github.repository }}"
          echo "════════════════════════════════════════════"

      - name: Prepare Deployment Artifact
        run: |
          rsync -av --exclude=".git" --exclude=".github" ./ ./

      - name: Validate Required Secrets
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "🔐 VALIDATING DEPLOYMENT SECRETS"
          echo "════════════════════════════════════════════"

          MISSING_SECRETS=""

          if [ -z "${{ secrets.HOST_IP }}" ]; then
            echo "❌ HOST_IP not configured"
            MISSING_SECRETS="HOST_IP "
          else
            echo "✅ HOST_IP is set"
          fi

          if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "❌ DEPLOY_PATH not configured"
            MISSING_SECRETS="${MISSING_SECRETS}DEPLOY_PATH "
          else
            echo "✅ DEPLOY_PATH is set"
          fi

          if [ -z "${{ secrets.DEPLOY_USERNAME }}" ]; then
            echo "❌ DEPLOY_USERNAME not configured"
            MISSING_SECRETS="${MISSING_SECRETS}DEPLOY_USERNAME "
          else
            echo "✅ DEPLOY_USERNAME is set"
          fi

          if [ -z "${{ secrets.HOST_KEY }}" ]; then
            echo "❌ HOST_KEY not configured"
            MISSING_SECRETS="${MISSING_SECRETS}HOST_KEY "
          else
            echo "✅ HOST_KEY is set"
          fi

          echo "════════════════════════════════════════════"

          if [ -n "$MISSING_SECRETS" ]; then
            echo ""
            echo "⚠️  MISSING SECRETS: $MISSING_SECRETS"
            echo ""
            echo "📋 To fix, go to:"
            echo "   GitHub → Settings → Environments → ${{ needs.determine-environment.outputs.environment }}"
            echo ""
            echo "Add these secrets:"
            echo "   • HOST_IP: Your server IP address"
            echo "   • DEPLOY_PATH: Target folder on server (e.g., /var/www/html)"
            echo "   • DEPLOY_USERNAME: SSH username (e.g., deploy)"
            echo "   • HOST_KEY: SSH private key"
            echo ""
            echo "❌ DEPLOYMENT CANNOT PROCEED"
            exit 1
          else
            echo "✅ ALL REQUIRED SECRETS ARE CONFIGURED"
            echo "🚀 DEPLOYMENT WILL PROCEED"
          fi
          echo ""

      - name: Display Deployment Info
        run: |
          set -e
          echo ""
          echo "════════════════════════════════════════════"
          echo "🚀 DEPLOYMENT CONFIGURATION SUMMARY"
          echo "════════════════════════════════════════════"
          echo "🎯 Target Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "👤 Actor: ${{ github.actor }}"
          echo ""
          echo "📋 DEPLOYMENT STEPS:"
          echo "   1️⃣  Clean remote folder at ${{ secrets.DEPLOY_PATH }}"
          echo "   2️⃣  Copy files via SCP"
          echo "   3️⃣  Restart Nginx"
          echo "════════════════════════════════════════════"
          echo ""

      - name: Clean remote folder
        continue-on-error: false
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          script: |
            echo "🗑️  Cleaning: ${{ secrets.DEPLOY_PATH }}"
            rm -rf ${{ secrets.DEPLOY_PATH }}/*
            echo "✅ Cleaned successfully"

      - name: Deploy to ${{ needs.determine-environment.outputs.environment }}
        continue-on-error: false
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          source: "./*"
          target: "${{ secrets.DEPLOY_PATH }}"
          strip_prefix: false
          overwrite: true

      - name: Restart Nginx
        continue-on-error: false
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          script: |
            echo "🔄 Restarting Nginx..."
            sudo systemctl restart nginx
            echo "✅ Nginx restarted successfully"
            echo "🌐 Service Status:"
            sudo systemctl status nginx --no-pager || true

      - name: Deployment Success
        if: success()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "════════════════════════════════════════════"
          echo "🎯 Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "⏰ Timestamp: $(date)"
          echo "════════════════════════════════════════════"
          echo ""

      - name: Deployment Failed
        if: failure()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "❌ DEPLOYMENT FAILED"
          echo "════════════════════════════════════════════"
          echo "🎯 Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "⏰ Timestamp: $(date)"
          echo "════════════════════════════════════════════"
          exit 1
