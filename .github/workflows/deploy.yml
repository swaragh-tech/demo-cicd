name: Deploy Static Site

on:
  workflow_run:
    workflows: ["Static Site Quality Check"]
    types:
      - completed

env:
  REGISTRY: ghcr.io

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy: ${{ steps.set-env.outputs.deploy }}
      source_branch: ${{ steps.set-env.outputs.source_branch }}
    steps:
      - name: Determine target environment (FIXED FOR workflow_run)
        id: set-env
        run: |
          # CRITICAL FIX: Use event.workflow_run.head_branch for workflow_run trigger
          # This gives the ACTUAL branch that triggered the original workflow
          SOURCE_BRANCH="${{ github.event.workflow_run.head_branch }}"

          echo "════════════════════════════════════════════"
          echo "🔍 ENVIRONMENT DETECTION STARTED"
          echo "⚠️  Using github.event.workflow_run.head_branch (CORRECT for workflow_run)"
          echo "📌 Source Branch: $SOURCE_BRANCH"
          echo "📌 github.ref (for reference): ${{ github.ref }}"
          echo "════════════════════════════════════════════"

          if [[ "$SOURCE_BRANCH" == "main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "source_branch=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
            echo "✅ ENVIRONMENT SET TO: production"
          elif [[ "$SOURCE_BRANCH" == "staging" ]]; then
            echo "environment=testing" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "source_branch=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
            echo "✅ ENVIRONMENT SET TO: testing"
          elif [[ "$SOURCE_BRANCH" == "develop" ]]; then
            echo "environment=development" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
            echo "source_branch=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
            echo "✅ ENVIRONMENT SET TO: development"
          else
            echo "environment=none" >> $GITHUB_OUTPUT
            echo "deploy=false" >> $GITHUB_OUTPUT
            echo "source_branch=$SOURCE_BRANCH" >> $GITHUB_OUTPUT
            echo "⏭️  DEPLOY SKIPPED - Branch not configured: $SOURCE_BRANCH"
          fi
          echo "════════════════════════════════════════════"

      - name: Skip notification
        if: steps.set-env.outputs.deploy == 'false'
        run: echo "⏭️  Skipping deployment for branch ${{ steps.set-env.outputs.source_branch }}"

  deploy:
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Environment Variables
        run: |
          echo "════════════════════════════════════════════"
          echo "📊 WORKFLOW EXECUTION ENVIRONMENT"
          echo "════════════════════════════════════════════"
          echo "🎯 Target Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🔄 Deploy Flag: ${{ needs.determine-environment.outputs.deploy }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "👤 Actor: ${{ github.actor }}"
          echo "🏢 Repository: ${{ github.repository }}"
          echo "════════════════════════════════════════════"

      - name: Prepare Deployment Artifact
        run: |
          rsync -av --exclude=".git" --exclude=".github" ./ ./

      - name: Debug SSH Key Format
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "🔍 SSH KEY FORMAT CHECK"
          echo "════════════════════════════════════════════"

          KEY_LENGTH=$(echo -n "${{ secrets.HOST_KEY }}" | wc -c)
          echo "📊 SSH Key length: $KEY_LENGTH characters"

          if [ "$KEY_LENGTH" -eq 0 ]; then
            echo "❌ CRITICAL: SSH Key is EMPTY"
            echo "   This means environment secrets were NOT injected"
            echo "   Cause: Environment name mismatch or protection rule issue"
          elif [ "$KEY_LENGTH" -lt 100 ]; then
            echo "⚠️  WARNING: SSH Key seems too short (${KEY_LENGTH} chars)"
            echo "   Valid SSH keys are typically 1700+ characters"
          elif echo "${{ secrets.HOST_KEY }}" | head -c 50 | grep -q "BEGIN.*PRIVATE KEY"; then
            echo "✅ SSH Key has valid BEGIN marker"
          else
            echo "⚠️  Key format may not be standard OpenSSH"
          fi

          if echo "${{ secrets.HOST_KEY }}" | tail -c 50 | grep -q "END.*PRIVATE KEY"; then
            echo "✅ SSH Key has valid END marker"  
          else
            if [ "$KEY_LENGTH" -gt 100 ]; then
              echo "⚠️  SSH Key might be incomplete (missing END marker)"
            fi
          fi

          echo "════════════════════════════════════════════"
          echo ""

      - name: Validate Required Secrets (FIXED with safe debug output)
        id: validate-secrets
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "🔐 VALIDATING DEPLOYMENT SECRETS"
          echo "🎯 Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🌳 Source Branch: ${{ needs.determine-environment.outputs.source_branch }}"
          echo "════════════════════════════════════════════"

          # Safely check if secrets exist without exposing values
          # Using ${var:+1} pattern - returns 1 if set, empty if not
          HOST_IP_SET="${{ secrets.HOST_IP }}${:+set}"
          DEPLOY_PATH_SET="${{ secrets.DEPLOY_PATH }}${:+set}"
          DEPLOY_USERNAME_SET="${{ secrets.DEPLOY_USERNAME }}${:+set}"
          HOST_KEY_SET="${{ secrets.HOST_KEY }}${:+set}"

          MISSING_SECRETS=""

          if [ -z "${{ secrets.HOST_IP }}" ]; then
            echo "❌ HOST_IP not configured (secret not found)"
            MISSING_SECRETS="${MISSING_SECRETS}HOST_IP "
          else
            # Only show length, not value
            KEY_LEN=$(echo -n "${{ secrets.HOST_IP }}" | wc -c)
            echo "✅ HOST_IP is set (length: ${KEY_LEN} chars)"
          fi

          if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then
            echo "❌ DEPLOY_PATH not configured"
            MISSING_SECRETS="${MISSING_SECRETS}DEPLOY_PATH "
          else
            echo "✅ DEPLOY_PATH is set"
          fi

          if [ -z "${{ secrets.DEPLOY_USERNAME }}" ]; then
            echo "❌ DEPLOY_USERNAME not configured"
            MISSING_SECRETS="${MISSING_SECRETS}DEPLOY_USERNAME "
          else
            echo "✅ DEPLOY_USERNAME is set"
          fi

          if [ -z "${{ secrets.HOST_KEY }}" ]; then
            echo "❌ HOST_KEY not configured (THIS IS LIKELY THE ISSUE)"
            echo "   This means environment secrets are NOT being injected"
            echo "   Check: Environment name case sensitivity"
            echo "   Check: Branch matches environment protection rules"
            MISSING_SECRETS="${MISSING_SECRETS}HOST_KEY "
          else
            # Safe debug: only check format, not content
            KEY_LEN=$(echo -n "${{ secrets.HOST_KEY }}" | wc -c)
            if echo "${{ secrets.HOST_KEY }}" | head -c 50 | grep -q "BEGIN.*PRIVATE KEY"; then
              echo "✅ HOST_KEY is set and has valid format (length: ${KEY_LEN} chars)"
            else
              echo "⚠️  HOST_KEY is set but format may be incorrect (length: ${KEY_LEN} chars)"
            fi
          fi

          echo "════════════════════════════════════════════"
          echo ""

          if [ -n "$MISSING_SECRETS" ]; then
            echo "⚠️  ⚠️  ⚠️  SECRETS MISSING ⚠️  ⚠️  ⚠️ "
            echo "Missing: $MISSING_SECRETS"
            echo ""
            echo "🔍 TROUBLESHOOTING:"
            echo ""
            echo "If HOST_KEY is missing:"
            echo "  1. Check Environment Name in GitHub is EXACTLY: '${{ needs.determine-environment.outputs.environment }}'"
            echo "  2. Environment names are CASE SENSITIVE"
            echo "  3. Verify branch protection rules aren't blocking environments"
            echo "  4. If using deployment protection rules, approve pending deployments"
            echo ""
            echo "If DEPLOY_PATH/USERNAME/IP are missing:"
            echo ""
            echo "1️⃣  Go to GitHub.com → Your Repository"
            echo "2️⃣  Click 'Settings' (gear icon at top)"
            echo "3️⃣  In left menu, click 'Environments'"
            echo "4️⃣  Create environment (if not exists): '${{ needs.determine-environment.outputs.environment }}'"
            echo "5️⃣  Click 'Add secret' and configure:"
            echo ""
            echo "   HOST_IP='your.server.ip.address'"
            echo "   DEPLOY_PATH='/var/www/html'"
            echo "   DEPLOY_USERNAME='deploy_user'"  
            echo "   HOST_KEY='-----BEGIN OPENSSH PRIVATE KEY-----\\n...'"
            echo ""
            echo "════════════════════════════════════════════"
            echo "❌ DEPLOYMENT STOPPED - SECRETS MISSING"
            echo "════════════════════════════════════════════"
            exit 1
          else
            echo "✅ ALL REQUIRED SECRETS CONFIGURED"
            echo "✅ Environment secrets successfully injected"
            echo "🚀 PROCEEDING WITH DEPLOYMENT"
            echo "════════════════════════════════════════════"
            echo ""
          fi

      - name: Test SSH Connection (FIXED - logs now visible)
        id: ssh-test
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          port: 22
          passphrase: ""
          timeout: 10s
          command_timeout: 5m
          script_stop: true
          sync: false
          # IMPORTANT: If SSH auth fails, this script never executes.
          # That's why you see no logs. Authentication failure = early Docker exit.
          script: |
            set -e
            echo "🔗 SSH CONNECTION SUCCESSFUL ✅"
            echo "=========================="
            echo "Hostname: $(hostname)"
            echo "User: $(whoami)"
            echo "Current Time: $(date)"
            echo "Disk Space:"
            df -h | grep -E "Filesystem|^/" || df -h
            echo "=========================="

      - name: Display Deployment Info
        run: |
          set -e
          echo ""
          echo "════════════════════════════════════════════"
          echo "🚀 DEPLOYMENT CONFIGURATION SUMMARY"
          echo "════════════════════════════════════════════"
          echo "🎯 Target Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "👤 Actor: ${{ github.actor }}"
          echo ""
          echo "📋 DEPLOYMENT STEPS:"
          echo "   1️⃣  Clean remote folder at ${{ secrets.DEPLOY_PATH }}"
          echo "   2️⃣  Copy files via SCP"
          echo "   3️⃣  Restart Nginx"
          echo "════════════════════════════════════════════"
          echo ""

      - name: Clean remote folder
        continue-on-error: false
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          port: 22
          passphrase: ""
          timeout: 30s
          command_timeout: 10m
          script_stop: true
          script: |
            echo "🗑️  Cleaning: ${{ secrets.DEPLOY_PATH }}"
            rm -rf ${{ secrets.DEPLOY_PATH }}/*
            echo "✅ Cleaned successfully"

      - name: Deploy to ${{ needs.determine-environment.outputs.environment }}
        continue-on-error: false
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          port: 22
          source: "./*"
          target: "${{ secrets.DEPLOY_PATH }}"
          strip_prefix: false
          overwrite: true

      - name: Restart Nginx
        continue-on-error: false
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.HOST_KEY }}
          port: 22
          passphrase: ""
          timeout: 30s
          command_timeout: 10m
          script_stop: true
          script: |
            echo "🔄 Restarting Nginx..."
            sudo systemctl restart nginx
            echo "✅ Nginx restarted successfully"
            echo "🌐 Service Status:"
            sudo systemctl status nginx --no-pager || true

      - name: Deployment Success
        if: success()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY"
          echo "════════════════════════════════════════════"
          echo "🎯 Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "⏰ Timestamp: $(date)"
          echo "════════════════════════════════════════════"
          echo ""

      - name: Deployment Failed
        if: failure()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "❌ DEPLOYMENT FAILED"
          echo "════════════════════════════════════════════"
          echo "🎯 Environment: ${{ needs.determine-environment.outputs.environment }}"
          echo "🌳 Branch: ${{ github.ref }}"
          echo "📍 Commit SHA: ${{ github.sha }}"
          echo "⏰ Timestamp: $(date)"
          echo "════════════════════════════════════════════"
          exit 1
